<!DOCTYPE html>

<body class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 font-sans">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo } = React;

    // --- SVG Icons ---
    const Icon = ({ paths, className = "w-5 h-5", fill = "none" }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" dangerouslySetInnerHTML={{ __html: paths }} />

    const Icons = {

      Thermometer: (props) => <Icon paths='<path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/>' {...props} />,
      Leaf: (props) => <Icon paths='<path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/>' {...props} />,
      Settings: (props) => <Icon paths='<path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/>' {...props} />,
      RefreshCw: (props) => <Icon paths='<path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>' {...props} />,
      Wifi: (props) => <Icon paths='<path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/>' {...props} />,
      WifiOff: (props) => <Icon paths='<line x1="2" y1="2" x2="22" y2="22"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/>' {...props} />,
      AlertCircle: (props) => <Icon paths='<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>' {...props} />,
      Clock: (props) => <Icon paths='<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>' {...props} />,
      Database: (props) => <Icon paths='<ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>' {...props} />,
      Plus: (props) => <Icon paths='<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>' {...props} />,
      Trash2: (props) => <Icon paths='<polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/>' {...props} />,
      LayoutGrid: (props) => <Icon paths='<rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>' {...props} />,
      LineChartIcon: (props) => <Icon paths='<path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/>' {...props} />,
      Download: (props) => <Icon paths='<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>' {...props} />,
      Upload: (props) => <Icon paths='<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>' {...props} />,
      Save: (props) => <Icon paths='<path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>' {...props} />,
    };

    // --- Components ---

    const CircularProgress = ({ value, size = 120, strokeWidth = 12, color = 'text-green-500' }) => {
      const radius = (size - strokeWidth) / 2;
      const circumference = radius * 2 * Math.PI;
      const offset = circumference - (value / 100) * circumference;

      return (
        <div className="relative flex items-center justify-center" style={{ width: size, height: size }}>
          <svg className="absolute transform -rotate-90 w-full h-full">
            <circle cx={size / 2} cy={size / 2} r={radius} stroke="currentColor" strokeWidth={strokeWidth} fill="transparent" className="text-slate-100 dark:text-slate-700" />
            <circle cx={size / 2} cy={size / 2} r={radius} stroke="currentColor" strokeWidth={strokeWidth} fill="transparent" strokeDasharray={circumference} strokeDashoffset={offset} strokeLinecap="round" className={`${color} transition-all duration-1000 ease-in-out`} />
          </svg>
          <div className="absolute flex flex-col items-center justify-center">
            <span className="text-3xl font-bold text-slate-800 dark:text-white">{Math.round(value)}%</span>
            <span className="text-xs text-slate-500 font-medium uppercase tracking-wider">Moisture</span>
          </div>
        </div>
      );
    };

    const parseSupabaseDate = (dateStr) => {
      if (!dateStr) return Date.now();
      let s = dateStr.replace(' ', 'T');
      if (s.endsWith('+00')) {
        s = s.slice(0, -3) + 'Z';
      } else if (!s.endsWith('Z') && !s.match(/[+-]\d{2}:?\d{2}$/)) {
        s = s + 'Z';
      }
      const d = new Date(s);
      return isNaN(d.getTime()) ? Date.now() : d.getTime();
    };

    const SimpleLineChart = ({ data, timeRangeMs }) => {
      const chartId = useMemo(() => Math.random().toString(36).substr(2, 9), []);

      const sortedData = [...(data || [])].sort((a, b) => parseSupabaseDate(a.updated_at) - parseSupabaseDate(b.updated_at));

      if (sortedData.length === 0) {
        return (
          <div className="w-full h-48 mt-4 flex items-center justify-center text-sm text-slate-400 border border-dashed border-slate-200 dark:border-slate-700 rounded-xl bg-slate-50 dark:bg-slate-900/50">
            NaN
          </div>
        );
      }

      const maxTime = Date.now();
      const minTime = maxTime - timeRangeMs;

      let validPoints = [];
      let lastBeforeStart = null;

      sortedData.forEach(d => {
        const t = parseSupabaseDate(d.updated_at);
        const val = Math.max(0, Math.min(100, d.moisture));
        if (t < minTime) {
          lastBeforeStart = { t, val };
        } else if (t <= maxTime) {
          validPoints.push({ t, val });
        }
      });

      let chartPoints = [];

      if (validPoints.length === 0) {
        if (lastBeforeStart) {
          chartPoints = [
            { x: 0, y: 100 - lastBeforeStart.val, val: lastBeforeStart.val },
            { x: 100, y: 100 - lastBeforeStart.val, val: lastBeforeStart.val }
          ];
        } else {
          return (
            <div className="w-full h-48 mt-4 flex items-center justify-center text-sm text-slate-400 border border-dashed border-slate-200 dark:border-slate-700 rounded-xl bg-slate-50 dark:bg-slate-900/50">
              NaN
            </div>
          );
        }
      } else {
        if (lastBeforeStart) {
          chartPoints.push({ x: 0, y: 100 - lastBeforeStart.val, val: lastBeforeStart.val });
        }

        validPoints.forEach(p => {
          const x = ((p.t - minTime) / timeRangeMs) * 100;
          chartPoints.push({ x, y: 100 - p.val, val: p.val });
        });

        const lastVal = validPoints[validPoints.length - 1].val;
        chartPoints.push({ x: 100, y: 100 - lastVal, val: lastVal });
      }

      let pathString = `M ${chartPoints[0].x},${chartPoints[0].y} ` + chartPoints.map(p => `L ${p.x},${p.y}`).join(' ');
      let fillString = `M ${chartPoints[0].x},100 L ${chartPoints[0].x},${chartPoints[0].y} ` + chartPoints.map(p => `L ${p.x},${p.y}`).join(' ') + ` L ${chartPoints[chartPoints.length-1].x},100 Z`;

      const getColor = (v) => v < 30 ? '#ef4444' : v > 80 ? '#3b82f6' : '#10b981';
      const getFill = (v) => v < 30 ? 'rgba(239, 68, 68, 0.25)' : v > 80 ? 'rgba(59, 130, 246, 0.25)' : 'rgba(16, 185, 129, 0.25)';

      const formatTimeAxis = (timestamp) => {
        const d = new Date(timestamp);
        if (timeRangeMs > 24 * 60 * 60 * 1000) {
          return d.toLocaleDateString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        } else {
          return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }
      };

      return (
        <div className="relative w-full mt-4 bg-slate-50 dark:bg-slate-900/50 rounded-xl overflow-hidden flex flex-col">
          <div className="relative w-full h-48">
            <div className="absolute inset-0 flex flex-col justify-between pointer-events-none p-1">
              <div className="w-full border-t border-slate-200 dark:border-slate-700/50"></div>
              <div className="w-full border-t border-slate-200 dark:border-slate-700/50"></div>
              <div className="w-full border-t border-slate-200 dark:border-slate-700/50"></div>
            </div>
            
            <svg viewBox="0 0 100 100" preserveAspectRatio="none" className="absolute inset-0 w-full h-full pb-1">
              <defs>
                <linearGradient id={`line-gradient-${chartId}`} x1="0" y1="0" x2="100" y2="0" gradientUnits="userSpaceOnUse">
                  {chartPoints.map((p, i) => <stop key={`l-${i}`} offset={`${p.x}%`} stopColor={getColor(p.val)} />)}
                </linearGradient>
                <linearGradient id={`fill-gradient-${chartId}`} x1="0" y1="0" x2="100" y2="0" gradientUnits="userSpaceOnUse">
                  {chartPoints.map((p, i) => <stop key={`f-${i}`} offset={`${p.x}%`} stopColor={getFill(p.val)} />)}
                </linearGradient>
              </defs>
              <path d={fillString} fill={`url(#fill-gradient-${chartId})`} />
              <path d={pathString} fill="none" stroke={`url(#line-gradient-${chartId})`} strokeWidth="2" vectorEffect="non-scaling-stroke" strokeLinejoin="round" />
            </svg>
            
            <div className="absolute top-1 left-2 text-[10px] text-slate-400 font-medium bg-slate-50/80 dark:bg-slate-900/80 px-1 rounded shadow-sm">100%</div>
            <div className="absolute bottom-1 left-2 text-[10px] text-slate-400 font-medium bg-slate-50/80 dark:bg-slate-900/80 px-1 rounded shadow-sm">0%</div>
          </div>
          
          <div className="flex justify-between items-center px-2 pb-2 pt-1 text-[10px] text-slate-400 font-medium border-t border-slate-200/50 dark:border-slate-700/50">
            <span>{formatTimeAxis(minTime)}</span>
            <span>{formatTimeAxis(minTime + timeRangeMs / 2)}</span>
            <span>Now</span>
          </div>
        </div>
      );
    };

    const GraphCard = ({ plantConfig, history, timeRangeMs }) => {
      const latest = history && history.length > 0 ? history[history.length - 1] : null;

      return (
        <div className="bg-white dark:bg-slate-800 rounded-3xl p-6 shadow-sm border border-slate-100 dark:border-slate-700 transition-all hover:shadow-md">
          <div className="flex justify-between items-center mb-2">
            <h3 className="text-xl font-bold text-slate-800 dark:text-white flex items-center gap-2">
              <Icons.Leaf className="w-5 h-5 text-emerald-500" />
              {plantConfig.name}
            </h3>
            {latest && (
              <span className="text-sm font-bold text-slate-600 dark:text-slate-300">
                {latest.moisture.toFixed(1)}%
              </span>
            )}
          </div>
          <p className="text-xs text-slate-500 dark:text-slate-400 mb-4">Moisture History</p>
          <SimpleLineChart data={history} timeRangeMs={timeRangeMs} />
        </div>
      );
    };

    const PlantCard = ({ plantConfig, reading }) => {
      if (!reading) {
        return (
          <div className="bg-white dark:bg-slate-800 rounded-3xl p-6 shadow-sm border border-slate-100 dark:border-slate-700 opacity-70">
            <div className="flex justify-between items-start mb-6">
              <div>
                <h3 className="text-xl font-bold text-slate-800 dark:text-white flex items-center gap-2">
                  <Icons.Leaf className="w-5 h-5 text-slate-400" />
                  {plantConfig.name}
                </h3>
                <p className="text-sm font-medium px-2 py-1 rounded-full mt-2 inline-block bg-slate-100 text-slate-500 dark:bg-slate-700 dark:text-slate-400">
                  Waiting for data...
                </p>
              </div>
            </div>
            <div className="flex justify-center my-6">
              <CircularProgress value={0} color="text-slate-300" />
            </div>
            <div className="text-center text-sm text-slate-500 mt-6 pt-6 border-t border-slate-100 dark:border-slate-700">
              Ensure device ID <code className="bg-slate-100 dark:bg-slate-700 px-1 rounded">{plantConfig.id}</code> is sending data.
            </div>
          </div>
        );
      }

      let statusColor = 'text-green-500';
      let bgColor = 'bg-green-100 dark:bg-green-900/30';
      let statusText = 'Optimal';

      if (reading.moisture < 30) {
        statusColor = 'text-red-500';
        bgColor = 'bg-red-100 dark:bg-red-900/30';
        statusText = 'Needs Water';
      } else if (reading.moisture > 80) {
        statusColor = 'text-blue-500';
        bgColor = 'bg-blue-100 dark:bg-blue-900/30';
        statusText = 'Overwatered';
      }

      const timeAgo = (dateString) => {
        if (!dateString) return 'Unknown';
        const date = parseSupabaseDate(dateString);
        const now = Date.now();
        const seconds = Math.floor((now - date) / 1000);
        
        if (seconds < 60) return `${seconds}s ago`;
        if (seconds < 3600) return `${Math.floor(seconds / 60)}m ago`;
        return `${Math.floor(seconds / 3600)}h ago`;
      };

      return (
        <div className="bg-white dark:bg-slate-800 rounded-3xl p-6 shadow-sm border border-slate-100 dark:border-slate-700 transition-all hover:shadow-md">
          <div className="flex justify-between items-start mb-6">
            <div>
              <h3 className="text-xl font-bold text-slate-800 dark:text-white flex items-center gap-2">
                <Icons.Leaf className="w-5 h-5 text-emerald-500" />
                {plantConfig.name}
              </h3>
              <p className={`text-sm font-medium px-2 py-1 rounded-full mt-2 inline-block ${bgColor} ${statusColor}`}>
                {statusText}
              </p>
            </div>
            <div className="text-right">
              <div className="flex items-center text-slate-400 text-xs gap-1 justify-end">
                <Icons.Clock className="w-3 h-3" />
                <span>{timeAgo(reading.updated_at)}</span>
              </div>
            </div>
          </div>

          <div className="flex justify-center my-6">
            <CircularProgress value={reading.moisture} color={statusColor} />
          </div>

          <div className="grid grid-cols-2 gap-4 mt-6 pt-6 border-t border-slate-100 dark:border-slate-700">
            <div className="flex items-center gap-3">
              <div className="p-2 bg-blue-50 dark:bg-blue-900/20 rounded-lg text-blue-500">
                <Icons.Droplet className="w-5 h-5" />
              </div>
              <div>
                <p className="text-xs text-slate-500 dark:text-slate-400 font-medium">Sensor Value</p>
                <p className="text-sm font-bold text-slate-800 dark:text-white">{reading.moisture.toFixed(1)}%</p>
              </div>
            </div>
            
            <div className="flex items-center gap-3">
              <div className="p-2 bg-orange-50 dark:bg-orange-900/20 rounded-lg text-orange-500">
                <Icons.Thermometer className="w-5 h-5" />
              </div>
              <div>
                <p className="text-xs text-slate-500 dark:text-slate-400 font-medium">Temp (est)</p>
                <p className="text-sm font-bold text-slate-800 dark:text-white">
                  {reading.temperature ? `${reading.temperature}°C` : '--'}
                </p>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // --- Main Application ---

    function App() {
      const [isSimulated, setIsSimulated] = useState(false);
      const [showSettings, setShowSettings] = useState(false);
      const [activeTab, setActiveTab] = useState('dashboard');
      const [timeScale, setTimeScale] = useState('24h'); 
      
      const [readings, setReadings] = useState({});
      const [history, setHistory] = useState({}); 
      
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [lastFetch, setLastFetch] = useState(null);

      const [configuredPlants, setConfiguredPlants] = useState([
        { id: '1', name: 'Monstera Deliciosa' },
        { id: '2', name: 'Fiddle Leaf Fig' },
        { id: '3', name: 'Snake Plant' },
        { id: '4', name: 'Pothos' }
      ]);
      const [newPlantId, setNewPlantId] = useState('');
      const [newPlantName, setNewPlantName] = useState('');

      useEffect(() => {
        const loadDefaultConfig = async () => {
          const cached = localStorage.getItem('plantConfig');
          if (cached) {
            try {
              const data = JSON.parse(cached);
              if (Array.isArray(data) && data.length > 0) {
                setConfiguredPlants(data);
                return;
              }
            } catch(e) { console.error("Error parsing local storage config"); }
          }
          try {
            const response = await fetch('plant_config.json');
            if (response.ok) {
              const data = await response.json();
              if (Array.isArray(data)) {
                setConfiguredPlants(data);
              }
            }
          } catch (err) {
            console.log("No local plant_config.json found, using defaults.");
          }
        };
        loadDefaultConfig();
      }, []);

      useEffect(() => {
        localStorage.setItem('plantConfig', JSON.stringify(configuredPlants));
      }, [configuredPlants]);

      const [config, setConfig] = useState({
        url: 'https://hbrujdruzrjaaqbpjucp.supabase.co/',
        anonKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhicnVqZHJ1enJqYWFxYnBqdWNwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNDQ3ODMsImV4cCI6MjA4ODgyMDc4M30.ypjUq1IL3BdtrUW7OGE2HbKbY3t6O1c7xGShJF873PY',
        tableName: 'sensor_data',
        colId: 'plant_id',
        colMoisture: 'moisture',
        colTemp: 'temperature',
        colDate: 'created_at',
        pollingInterval: 5000 
      });

      const handleConfigChange = (e) => {
        setConfig({ ...config, [e.target.name]: e.target.value });
      };

      const connectSupabase = () => {
        if (!config.url || !config.anonKey || !config.tableName) {
          setError("Please provide URL, Anon Key, and Table Name.");
          return;
        }
        setIsSimulated(false);
        setShowSettings(false);
        setError(null);
        fetchSupabaseData();
      };

      const enableSimulation = () => {
        setIsSimulated(true);
        setShowSettings(false);
        setError(null);
      };

      const getTimeScaleMs = useCallback(() => {
        switch(timeScale) {
          case '5m': return 5 * 60 * 1000;
          case '1h': return 60 * 60 * 1000;
          case '24h': return 24 * 60 * 60 * 1000;
          case '7d': return 7 * 24 * 60 * 60 * 1000;
          case '30d': return 30 * 24 * 60 * 60 * 1000;
          default: return 24 * 60 * 60 * 1000;
        }
      }, [timeScale]);

      const fetchSupabaseData = useCallback(async () => {
        if (isSimulated || !config.url) return;

        try {
          setLoading(true);
          const cleanUrl = config.url.trim().replace(/\/$/, '');
          
          const timeRangeMs = getTimeScaleMs();
          const maxTime = Date.now();
          const minTime = maxTime - timeRangeMs;
          
          const encodedStartTime = encodeURIComponent(new Date(minTime).toISOString());
          const fetchOptions = {
            headers: {
              'apikey': config.anonKey,
              'Authorization': `Bearer ${config.anonKey}`,
              'Content-Type': 'application/json',
              'Prefer': 'return=representation'
            }
          };

          const baseEndpoint = `${cleanUrl}/rest/v1/${config.tableName}?select=*`;
          const recentEndpoint = `${baseEndpoint}&${config.colDate}=gte.${encodedStartTime}&order=${config.colDate}.desc&limit=1000`;
          
          const response = await fetch(recentEndpoint, fetchOptions);

          if (!response.ok) {
            throw new Error(`Supabase Error ${response.status}: Check your Table Name, URL, or RLS policies.`);
          }

          let allFetchedData = await response.json();

          // If the 1000 row limit truncated our history, fetch properly spaced samples for the missing time.
          if (allFetchedData.length > 0) {
            const oldestDateInBatch = parseSupabaseDate(allFetchedData[allFetchedData.length - 1][config.colDate]);
            
            // If the oldest record is significantly newer than our start time, we hit the row limit
            if (oldestDateInBatch > minTime + (timeRangeMs * 0.05)) {
              console.log("Fetching historical samples to fill graph timeline for all sensors...");
              const missingDuration = oldestDateInBatch - minTime;
              const numBuckets = 30; // 30 buckets is plenty for smooth curves and prevents browser network stalling
              const step = missingDuration / numBuckets;
              
              const samplePromises = [];
              for (let i = 0; i < numBuckets; i++) {
                const sampleStart = new Date(minTime + (i * step)).toISOString();
                const sampleEnd = new Date(minTime + ((i + 1) * step)).toISOString();
                
                // FIX: limit=50 instead of limit=1 ensures we grab readings for ALL plants in this time slice, not just one!
                const p = fetch(`${baseEndpoint}&${config.colDate}=gte.${encodeURIComponent(sampleStart)}&${config.colDate}=lt.${encodeURIComponent(sampleEnd)}&order=${config.colDate}.desc&limit=50`, fetchOptions)
                  .then(res => res.json())
                  .then(arr => arr.length > 0 ? arr : null) // Return the whole array of 50 rows
                  .catch(() => null); 
                  
                samplePromises.push(p);
              }
              
              const historicalSamples = await Promise.all(samplePromises);
              historicalSamples.forEach(sampleArray => {
                if (sampleArray && Array.isArray(sampleArray)) {
                  allFetchedData.push(...sampleArray); // Merge all plant readings from this bucket
                }
              });
            }
          }

          const newReadings = {};
          const newHistory = {};

          // Group by Plant ID
          const dataByPlant = {};
          allFetchedData.forEach(row => {
            const id = String(row[config.colId]);
            if (id && id !== 'undefined' && id !== 'null') {
              if (!dataByPlant[id]) dataByPlant[id] = [];
              dataByPlant[id].push(row);
            }
          });

          // Target uniform resolution across the whole chart
          const TARGET_POINTS = 100;
          const bucketSizeMs = timeRangeMs / TARGET_POINTS;

          Object.keys(dataByPlant).forEach(id => {
            const plantData = dataByPlant[id];
            
            // 1. Get the absolute latest reading for the dashboard cards
            const sortedDesc = [...plantData].sort((a, b) => parseSupabaseDate(b[config.colDate]) - parseSupabaseDate(a[config.colDate]));
            if (sortedDesc.length > 0) {
              newReadings[id] = {
                moisture: Number(sortedDesc[0][config.colMoisture]) || 0,
                temperature: sortedDesc[0][config.colTemp] ? Number(sortedDesc[0][config.colTemp]) : null,
                updated_at: sortedDesc[0][config.colDate]
              };
            }

            // 2. Uniform Downsampling for the graph
            const uniformBuckets = new Map();
            
            plantData.forEach(d => {
              const t = parseSupabaseDate(d[config.colDate]);
              if (t >= minTime && t <= maxTime) {
                const bucketIndex = Math.floor((t - minTime) / bucketSizeMs);
                // Keep the newest point inside this specific time bucket
                if (!uniformBuckets.has(bucketIndex) || t > parseSupabaseDate(uniformBuckets.get(bucketIndex)[config.colDate])) {
                  uniformBuckets.set(bucketIndex, d);
                }
              }
            });

            // Convert map back to array and sort chronologically (oldest to newest)
            const uniformData = Array.from(uniformBuckets.values()).sort((a, b) => parseSupabaseDate(a[config.colDate]) - parseSupabaseDate(b[config.colDate]));

            newHistory[id] = uniformData.map(row => ({
              moisture: Number(row[config.colMoisture]) || 0,
              temperature: row[config.colTemp] ? Number(row[config.colTemp]) : null,
              updated_at: row[config.colDate]
            }));
          });

          setHistory(newHistory);
          setReadings(newReadings);
          setLastFetch(new Date());
          setError(null);
        } catch (err) {
          console.error("Fetch error:", err);
          setError(err.message);
        } finally {
          setLoading(false);
        }
      }, [config, isSimulated, getTimeScaleMs]);

      const generateSimulatedData = useCallback((reseed = false) => {
        const now = Date.now();
        const timeSpanMs = getTimeScaleMs();

        setHistory(prevHistory => {
          const nextHistory = { ...prevHistory };
          const nextReadings = {};
          
          configuredPlants.forEach(plant => {
            if (reseed || !nextHistory[plant.id] || nextHistory[plant.id].length === 0) {
               const pts = [];
               let currentMoisture = 40 + Math.random() * 40;
               const numPoints = 60; 
               
               for (let i = 0; i < numPoints; i++) {
                 const ptTime = now - timeSpanMs + (i * (timeSpanMs / numPoints));
                 currentMoisture = Math.max(0, Math.min(100, currentMoisture + (Math.random() - 0.5) * 8));
                 pts.push({
                   moisture: currentMoisture,
                   temperature: 20 + Math.random() * 5,
                   updated_at: new Date(ptTime).toISOString()
                 });
               }
               nextHistory[plant.id] = pts;
               nextReadings[plant.id] = pts[pts.length - 1];
            } else {
               const lastPt = nextHistory[plant.id][nextHistory[plant.id].length - 1];
               const change = (Math.random() - 0.5) * 5; 
               const newMoisture = Math.max(0, Math.min(100, lastPt.moisture + change));
               
               const newPt = {
                 moisture: newMoisture,
                 temperature: 20 + Math.random() * 5,
                 updated_at: new Date(now).toISOString()
               };
               
               const updatedPts = [...nextHistory[plant.id], newPt];
               const filteredPts = updatedPts.filter(pt => (now - new Date(pt.updated_at).getTime()) <= timeSpanMs);
               
               nextHistory[plant.id] = filteredPts;
               nextReadings[plant.id] = newPt;
            }
          });
          
          setReadings(nextReadings);
          return nextHistory;
        });

        setLastFetch(new Date());
        setLoading(false);
      }, [configuredPlants, getTimeScaleMs]);

      useEffect(() => {

          generateSimulatedData(true); 
        } else {
          fetchSupabaseData();
        }
      }, [timeScale]);

          } else {

            await writable.close();
          } else {

          }
